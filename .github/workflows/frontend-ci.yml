name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "automail-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "automail-frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  test:
    name: Lint + Type-check + Test + Build (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automail-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: automail-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Type-check + Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
