name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "automail-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "automail-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Lint + Test (Python 3.13)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_automail
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: automail-backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_automail
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      ANTHROPIC_API_KEY: sk-ant-fake-key-for-ci-tests-only
      GOOGLE_CLIENT_ID: fake-client-id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: fake-client-secret
      APP_SECRET_KEY: ci-test-app-secret-key-not-for-production
      TRACKING_SECRET_KEY: ci-test-tracking-secret-not-for-production
      RATE_LIMITING_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            automail-backend/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('automail-backend/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Generate Fernet key for tests
        run: |
          FERNET_KEY=$(uv run python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "FERNET_KEY=$FERNET_KEY" >> $GITHUB_ENV

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -v --tb=short
