  <text x="296" y="253" font-family="Arial, sans-serif" font-size="14" fill="white">Jorge Decuir</text>
  <rect x="276" y="228" width="480" height="40" rx="6" fill="none" stroke="#818cf8" stroke-width="1.5"/>

  <text x="276" y="300" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">Company</text>
