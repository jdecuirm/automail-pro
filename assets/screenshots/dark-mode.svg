  <text x="296" y="333" font-family="Arial, sans-serif" font-size="14" fill="white">Decuir Solutions</text>

  <text x="276" y="380" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">Email</text>
  <rect x="276" y="388" width="480" height="40" rx="6" fill="#1f2937"/>
  <text x="296" y="413" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">jdecuirm@gmail.com</text>

  <rect x="276" y="452" width="120" height="36" rx="6" fill="#818cf8"/>
